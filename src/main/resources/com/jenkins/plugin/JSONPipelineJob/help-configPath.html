<div>
  <p><strong>JSON 配置文件</strong>在仓库中的相对路径。</p>
  <p>示例：</p>
  <ul>
    <li><code>prod/deploy.json</code></li>
    <li><code>dev/build.json</code></li>
    <li><code>pipelines/backend.json</code></li>
  </ul>
  <p>
    该文件必须符合 <code>jenkins-json-pipeline</code> 共享库的 JSON Schema
    格式。
  </p>
</div>
